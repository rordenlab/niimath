environment:
  matrix:
    - job_name: win
      appveyor_build_worker_image: Visual Studio 2022

    - job_name: linux
      appveyor_build_worker_image: Ubuntu2004

    - job_name: mac
      appveyor_build_worker_image: macos-monterey

    - job_name: test
      appveyor_build_worker_image: Ubuntu2004

matrix:
  fast_finish: true

version: build-{build}

configuration: Release

platform: x64

clone_depth: 1

init:
  - ps: >-
      $env:DATE = $(Get-Date -Format d-MMM-yyyy)

      $githash = $env:APPVEYOR_REPO_COMMIT.Substring(0, 7)

      $gittag = if ($env:APPVEYOR_REPO_TAG -eq $True) {"_$($env:APPVEYOR_REPO_TAG_NAME)"} else {""}

      Update-AppveyorBuild -Version "$($env:DATE)_g${githash}${gittag}"

      $env:RELEASE_VERSION = $(Get-Date -Format d-MMMM-yyyy)

for:
  -
    matrix:
      only:
        - job_name: win

    build_script:
      - cmake -Wno-dev -B build
      - cmake --build build --config %configuration%

    after_build:
      - 7z a niimath_win.zip .\build\bin\* >$null
      - appveyor PushArtifact niimath_win.zip

  -
    matrix:
      only:
        - job_name: linux

    build_script:
      - export CC=gcc-9 CXX=g++-9
      - cmake -Wno-dev -B build
      - cmake --build build

    after_build:
      - 7z a niimath_lnx.zip ./build/bin/* &>/dev/null
      - appveyor PushArtifact niimath_lnx.zip

  -
    matrix:
      only:
        - job_name: mac

    build_script:
      # Build a universal (x86_64+arm64) STATIC libzstd from source so both slices can
      # link zstd. Homebrew only provides the runner's native arch, which is why the
      # cross-compiled slice previously had to disable zstd. Static linking also drops
      # the runtime libzstd.dylib dependency, making the released binary portable.
      - curl -sL -o zstd.tar.gz https://github.com/facebook/zstd/releases/download/v1.5.6/zstd-1.5.6.tar.gz
      - tar xzf zstd.tar.gz
      - make -C zstd-1.5.6/lib -j libzstd.a CFLAGS="-O3 -fPIC -arch x86_64 -arch arm64"
      - mkdir -p zstduniv/lib/pkgconfig zstduniv/include && cp zstd-1.5.6/lib/libzstd.a zstduniv/lib/ && cp zstd-1.5.6/lib/zstd.h zstduniv/include/
      - printf 'prefix=%s/zstduniv\nlibdir=${prefix}/lib\nincludedir=${prefix}/include\nName: zstd\nDescription: zstd\nVersion: 1.5.6\nLibs: -L${libdir} -lzstd\nCflags: -I${includedir}\n' "$PWD" > zstduniv/lib/pkgconfig/libzstd.pc
      # PKG_CONFIG_PATH must be set for the build step too: the SuperBuild configures the
      # inner src project (which runs pkg_check_modules) during `cmake --build`.
      - PKG_CONFIG_PATH=$PWD/zstduniv/lib/pkgconfig cmake -Wno-dev -DCMAKE_OSX_ARCHITECTURES=x86_64 -DOPENMP_XCODE=OFF -B build/x86_64
      - PKG_CONFIG_PATH=$PWD/zstduniv/lib/pkgconfig cmake --build build/x86_64
      - PKG_CONFIG_PATH=$PWD/zstduniv/lib/pkgconfig cmake -Wno-dev -DCMAKE_OSX_ARCHITECTURES=arm64 -DOPENMP_XCODE=OFF -B build/arm64
      - PKG_CONFIG_PATH=$PWD/zstduniv/lib/pkgconfig cmake --build build/arm64

    after_build:
      - lipo -create -output build/niimath build/x86_64/bin/niimath build/arm64/bin/niimath
      - lipo -info build/niimath   # expect: x86_64 arm64
      - otool -L build/niimath | grep -i zstd || echo "zstd statically linked (no dylib dependency)"
      - zip -j niimath_macos.zip ./build/niimath &>/dev/null
      - appveyor PushArtifact niimath_macos.zip

  -
    matrix:
      only:
        - job_name: test

    build_script:
      - export CC=gcc-9 CXX=g++-9
      - cmake -Wno-dev -B build
      - cmake --build build

    after_build:
      - export builddir=$APPVEYOR_BUILD_FOLDER/build
      - export exe=$builddir/bin/niimath tstexe=$builddir/bin/niimath basedir=$builddir/niimath_tests
      - git clone https://github.com/rordenlab/niimath_tests.git $basedir
      - cd $basedir; ./canonical_test.sh

deploy:
  - provider: GitHub
    tag: $(APPVEYOR_REPO_TAG_NAME)
    release: version $(RELEASE_VERSION) ($(APPVEYOR_REPO_TAG_NAME))
    description: ""
    auth_token:
      secure: AkRtDExPl2IzRW9oEojYwx593B1S9GERT8H0XgelH7fPwVspj9GAIfMYaFImjJ3M
    artifact: /niimath_.*\.zip/
    draft: false
    prerelease: false
    on:
      APPVEYOR_REPO_TAG: true
